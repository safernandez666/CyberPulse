# =============================================================================
# CyberPulse — Docker Compose para desarrollo
# Hot-reload del frontend (Vite) y del servidor (tsx watch)
# =============================================================================

services:
  cyberpulse-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: cyberpulse-dev
    ports:
      - "3000:3000"   # Vite dev server
      - "3001:3001"   # API backend
    environment:
      - NODE_ENV=development
      - PORT=3001
      - CYBERPULSE_API_KEY=${CYBERPULSE_API_KEY:-}
      - SCRAPE_CRON=*/15 * * * *
    volumes:
      # Código fuente: se monta para reflejar cambios en caliente
      - ./src:/app/src
      - ./server:/app/server
      - ./public:/app/public

      # Configuración del proyecto
      - ./package.json:/app/package.json
      - ./package-lock.json:/app/package-lock.json
      - ./tsconfig.json:/app/tsconfig.json
      - ./tsconfig.app.json:/app/tsconfig.app.json
      - ./tsconfig.node.json:/app/tsconfig.node.json
      - ./vite.config.ts:/app/vite.config.ts
      - ./index.html:/app/index.html
      - ./tailwind.config.js:/app/tailwind.config.js
      - ./postcss.config.js:/app/postcss.config.js
      - ./components.json:/app/components.json

      # node_modules dentro del contenedor, no se mezcla con el host
      - cyberpulse-node_modules:/app/node_modules

      # Persistir base de datos
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  cyberpulse-node_modules:
