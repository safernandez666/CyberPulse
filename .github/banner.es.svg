<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1200" height="420" viewBox="0 0 1200 420">
  <!-- Background -->
  <rect width="1200" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Logo -->
  <image x="540" y="35" width="120" height="120" xlink:href="data:image/svg+xml;base64,"/>

  <!-- Title -->
  <text x="600" y="210" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="52" font-weight="bold" fill="#ffffff">CyberPulse</text>

  <!-- Subtitle -->
  <text x="600" y="255" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="22" font-weight="600" fill="#e5e5e5">Agregador de noticias de ciberseguridad con generador de posts para LinkedIn.</text>

  <!-- Description -->
  <text x="600" y="290" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="16" fill="#a3a3a3">Consume más de 100 fuentes RSS, clasifica artículos por severidad/categoría y genera contenido listo para publicar.</text>

  <!-- Language link -->
  <text x="600" y="325" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="15" fill="#a3a3a3">🇬🇧 Read in English</text>

  <!-- Badges -->
  <g transform="translate(600, 365)" text-anchor="middle">
    <image href="https://img.shields.io/badge/Docker-ready-2496ED?logo=docker&logoColor=white" x="-245" y="-13" height="26"/>
    <image href="https://img.shields.io/badge/Node.js-20+-339933?logo=nodedotjs&logoColor=white" x="-120" y="-13" height="26"/>
    <image href="https://img.shields.io/badge/React-19-61DAFB?logo=react&logoColor=black" x="5" y="-13" height="26"/>
    <image href="https://img.shields.io/badge/License-MIT-yellow.svg" x="110" y="-13" height="26"/>
  </g>
</svg>
